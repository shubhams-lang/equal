<!DOCTYPE html>

<head>

  <!-- SEO -->
  <title>Anonymous Chat | Secure & Private Messaging</title>

  <meta name="twitter:description" content="Secure anonymous real-time chat platform." />
  <meta name="twitter:image" content="https://ekpyrotic.vercel.app/preview.png" />

  <meta http-equiv="Content-Security-Policy"
    content="
      default-src 'self';
      img-src 'self' data: blob: https:;
      media-src 'self' data: blob:;
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com;

      connect-src 'self' https://equal.onrender.com wss://equal.onrender.com https://www.google-analytics.com https://*.google-analytics.com;
      frame-ancestors 'none';
      base-uri 'self';
      form-action 'self';

  <link rel="preconnect" href="https://www.googletagmanager.com">

    "@context": "https://schema.org",

    "name": "Ekpyrotic Anonymous Chat",
    "url": "https://ekpyrotic.vercel.app/",

<body class="bg-gray-900">

  <!-- Service Worker -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/service-worker.js")
          .then(reg => console.log("Service Worker registered", reg))
          .catch(err => console.log("Service Worker failed", err));
      });
    }
